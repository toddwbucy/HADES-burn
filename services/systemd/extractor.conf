# HADES Extraction Service Configuration
# Install to /etc/hades/extractor.conf
# This file is sourced by the systemd unit via EnvironmentFile=

# GPU visibility — restricts PyTorch to ONLY these GPUs at the CUDA driver level.
# GPU 2 becomes cuda:0 inside the process.
CUDA_VISIBLE_DEVICES=2

# Application-level device selection (relative to CUDA_VISIBLE_DEVICES).
HADES_EXTRACTOR_DEVICE=cuda:0

# Socket path
HADES_EXTRACTOR_SOCKET=/run/hades/extractor.sock

# Enable OCR for scanned PDFs (slower, higher accuracy)
HADES_EXTRACTOR_OCR=false

# Idle timeout in seconds — unload Docling VLM from VRAM after idle.
# Set to 0 to disable idle unloading.
HADES_EXTRACTOR_IDLE_TIMEOUT=900

# PyMuPDF fallback if Docling fails
HADES_EXTRACTOR_FALLBACK=true

# HuggingFace cache (ProtectHome=read-only blocks ~/.cache)
HF_HOME=/var/cache/hades/huggingface
TRANSFORMERS_CACHE=/var/cache/hades/huggingface

# PyTorch memory management
PYTORCH_ALLOC_CONF=expandable_segments:True
