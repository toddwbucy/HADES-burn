# /etc/tmpfiles.d/hades.conf
#
# Reclaims /run/hades/ for the `hades` service user (currently owned by
# weaver-embedder:weaver-embedder as a leftover from the WeaverTools rebrand).
# Sockets inside this directory are created by the services themselves
# (hades-daemon.service via RuntimeDirectory=hades, etc.).
#
# Apply: sudo systemd-tmpfiles --create /etc/tmpfiles.d/hades.conf

#Type Path        Mode UID    GID    Age Argument
d     /run/hades  0755 hades  hades  -   -
