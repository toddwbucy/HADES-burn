# /etc/sysusers.d/hades.conf
#
# Service identity for HADES — the ArangoDB knowledge-graph DBA toolkit.
# HADES is NOT part of the WeaverTools harness; it is a peer admin tool that
# joins the `weaver-admin` group as an opportunistic consumer of Weaver's
# embedder service, and the `arangodb` group as a constitutive consumer of
# the ArangoDB Unix socket.
#
# Adopts existing GID 985 (group `hades` already exists from the previous
# Python install). UID 985 is reserved for symmetry.
#
# Apply: sudo systemd-sysusers /etc/sysusers.d/hades.conf
# Reverse: sudo userdel hades

#Type Name      ID    GECOS                                Home dir       Shell
u     hades     985   "HADES knowledge-graph DBA tool"     /var/lib/hades /usr/sbin/nologin
g     hades     985   -
m     hades     hades
m     hades     weaver-admin
m     hades     arangodb
