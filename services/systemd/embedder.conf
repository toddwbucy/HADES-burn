# HADES Embedder Service Configuration
# Install to /etc/hades/embedder.conf (mode 0644 root:root)
# This file is sourced by hades-embedder.service via EnvironmentFile=

# GPU visibility — restricts PyTorch to ONLY these GPUs at the CUDA driver
# level. With CUDA_VISIBLE_DEVICES=2, GPU 2 becomes cuda:0 inside the
# process (the only visible device).
CUDA_VISIBLE_DEVICES=2

# Application-level device selection (relative to CUDA_VISIBLE_DEVICES).
HADES_EMBEDDER_DEVICE=cuda:0

# HTTP listen address — must match the embedder URL in HADES's hades.yaml
# (e.g. http://localhost:8000/v1).
HADES_EMBEDDER_HOST=127.0.0.1
HADES_EMBEDDER_PORT=8000

# Precision and batching. batch_size is intentionally small for the 16GB
# RTX 2000 Ada; raise on larger GPUs.
HADES_EMBEDDER_FP16=true
HADES_EMBEDDER_BATCH_SIZE=4

# Idle timeout — unload model from VRAM after this many seconds idle.
# Set to 0 to disable idle unloading (model stays resident).
HADES_EMBEDDER_IDLE_TIMEOUT=900

# HuggingFace cache (ProtectHome=read-only blocks ~/.cache).
HF_HOME=/var/cache/hades/huggingface
TRANSFORMERS_CACHE=/var/cache/hades/huggingface

# PyTorch memory tuning.
PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
